<ion-header>
  <ion-toolbar color="warning">
    <ion-title>Registra Pagamento</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Annulla</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Riepilogo Importo -->
  <div class="ion-text-center ion-padding-vertical">
    <p style="color: #666; margin-bottom: 5px;">Totale ordine <b>#{{ orderName }}</b></p>
    <h1 style="font-size: 32px; font-weight: bold; margin-top: 0;">€ {{ orderTotal.toFixed(2) }}</h1>
  </div>

  <!-- Selezione Metodo di Pagamento -->
  <div class="ion-margin-top">
    <p style="font-weight: bold; margin-left: 5px;">Metodo di pagamento:</p>
    
    <ion-list lines="none">
      <ion-radio-group [(ngModel)]="paymentMethod">
        <ion-item class="payment-item" [class.selected]="paymentMethod === '14'">
          <ion-icon name="cash-outline" slot="start" color="success"></ion-icon>
          <ion-label>Contanti</ion-label>
          <ion-radio slot="end" value="14"></ion-radio>
        </ion-item>

        <ion-item class="payment-item" [class.selected]="paymentMethod === '17'">
          <ion-icon name="card-outline" slot="start" color="primary"></ion-icon>
          <ion-label>Carta</ion-label>
          <ion-radio slot="end" value="17"></ion-radio>
        </ion-item>

        <ion-item class="payment-item" [class.selected]="paymentMethod === '13'">
          <ion-icon name="business-outline" slot="start" color="secondary"></ion-icon>
          <ion-label>Bonifico Bancario</ion-label>
          <ion-radio slot="end" value="13"></ion-radio>
        </ion-item>
      </ion-radio-group>
    </ion-list>
  </div>

  <!-- Box Importo Dinamico (appare solo se è selezionato un metodo) -->
  @if (paymentMethod) {
    <div class="ion-margin-top ion-padding" style="background: #fff4e5; border-radius: 12px; border: 1px solid #ffca28;">
      
      <ion-item lines="none" style="--background: transparent;">
        <ion-checkbox [(ngModel)]="isFullPayment" (ionChange)="onToggleFullPayment()" labelPlacement="end">
          Paga completamente
        </ion-checkbox>
      </ion-item>

      <ion-item lines="outline" style="--border-radius: 8px; margin-top: 10px;">
        <ion-label position="stacked">Importo ricevuto (€)</ion-label>
        <ion-input 
          type="number" 
          inputmode="decimal"
          [(ngModel)]="amountPaid" 
          [disabled]="isFullPayment"
          placeholder="0.00">
        </ion-input>
      </ion-item>
    </div>
  }

  <!-- Pulsante di Azione -->
  <div class="ion-margin-top ion-padding-top">
    <ion-button expand="block" color="warning" [disabled]="!paymentMethod || (!amountPaid && !isFullPayment)" (click)="confirmWithPayment()">
      Conferma e Chiudi Pratica
    </ion-button>
  </div>
</ion-content>
