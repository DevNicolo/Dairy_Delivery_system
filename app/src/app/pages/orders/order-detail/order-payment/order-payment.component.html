<ion-header class="ion-no-border" [translucent]="true">
  <ion-toolbar>
    <ion-title class="ion-text-center">Registra Pagamento</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()" color="medium" style="font-weight: 600;">Annulla</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding page-bg">
  
  <div class="summary-section">
    <p class="summary-subtitle">Totale ordine <b style="color: var(--ion-color-warning);">#{{ orderName }}</b></p>
    <h1 class="summary-total">€ {{ orderTotal.toFixed(2) }}</h1>
    <h3 *ngIf="(amountResidual > 0) && amountResidual !== orderTotal" class="summary-residual">
      Importo residuo: € {{ amountResidual.toFixed(2) }}
    </h3>
  </div>

  <div class="payment-section">
    <h3 class="section-title">Metodo di pagamento</h3>
    
    <ion-list lines="none" class="bg-transparent">
      <ion-radio-group [(ngModel)]="paymentMethod">
        
        <ion-item class="payment-card" [class.selected]="paymentMethod === '14'">
          <div class="icon-box" slot="start" style="--icon-color: var(--ion-color-success);">
            <ion-icon name="cash-outline"></ion-icon>
          </div>
          <ion-label class="payment-label">Contanti</ion-label>
          <ion-radio slot="end" value="14"></ion-radio>
        </ion-item>

        <ion-item class="payment-card" [class.selected]="paymentMethod === '17'">
          <div class="icon-box" slot="start" style="--icon-color: var(--ion-color-primary);">
            <ion-icon name="card-outline"></ion-icon>
          </div>
          <ion-label class="payment-label">Carta</ion-label>
          <ion-radio slot="end" value="17"></ion-radio>
        </ion-item>

        <ion-item class="payment-card" [class.selected]="paymentMethod === '13'">
          <div class="icon-box" slot="start" style="--icon-color: var(--ion-color-secondary);">
            <ion-icon name="business-outline"></ion-icon>
          </div>
          <ion-label class="payment-label">Bonifico Bancario</ion-label>
          <ion-radio slot="end" value="13"></ion-radio>
        </ion-item>

      </ion-radio-group>
    </ion-list>
  </div>

  @if (paymentMethod) {
    <div class="amount-card">
      <ion-item lines="none" class="bg-transparent">
        <ion-checkbox [(ngModel)]="isFullPayment" (ionChange)="onToggleFullPayment()" labelPlacement="end" color="warning">
          Paga completamente
        </ion-checkbox>
      </ion-item>

      <div class="amount-input-wrapper">
        <span class="currency-symbol">€</span>
        <ion-input 
          class="amount-input"
          type="number" 
          inputmode="decimal"
          [(ngModel)]="amountPaid" 
          (ionChange)="AmountControl(0)"
          [disabled]="isFullPayment"
          placeholder="0.00">
        </ion-input>
      </div>
    </div>
  }

</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="ion-padding-horizontal ion-padding-bottom">
    <ion-button expand="block" shape="round" color="warning" [disabled]="!paymentMethod || (!amountPaid && !isFullPayment)" (click)="confirmWithPayment()" class="action-btn">
      <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
      Conferma e Chiudi
    </ion-button>
  </ion-toolbar>
</ion-footer>
