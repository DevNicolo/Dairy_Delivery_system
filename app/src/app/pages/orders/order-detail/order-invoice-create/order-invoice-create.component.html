<ion-header class="ion-no-border" [translucent]="true">
  <ion-toolbar>
    <ion-title class="ion-text-center">Consegna</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()" color="medium" style="font-weight: 600;">Chiudi</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding page-bg">
  
  <div class="success-hero">
    <div class="icon-wrapper">
      <ion-icon name="checkmark-circle-outline" color="success"></ion-icon>
    </div>
    <h2 class="main-title">Ottimo lavoro!</h2>
    <p class="sub-title">La consegna per <b style="color: var(--ion-color-success);">#{{ orderName }}</b> è stata registrata con successo.</p>
  </div>

  <div class="info-card">
    <ion-icon name="receipt-outline" class="card-icon" color="primary"></ion-icon>
    <div class="card-text">
      <h3>Fatturazione</h3>
      <p>Vuoi generare subito la fattura per questo ordine?</p>
    </div>
  </div>

</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="ion-padding-horizontal ion-padding-bottom">
    
    <ion-button expand="block" shape="round" color="success" (click)="confirmWithInvoice()" style="height: 54px; font-weight: bold; font-size: 1.1em; margin-top: 10px;">
      Sì, genera fattura
    </ion-button>

    <ion-button expand="block" fill="clear" color="medium" (click)="confirmWithoutInvoice()" style="height: 54px; font-weight: 600; font-size: 1em; margin-top: 5px;">
      No, solo consegna
    </ion-button>

  </ion-toolbar>
</ion-footer>
